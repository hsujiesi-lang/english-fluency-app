<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="50" font-family="Helvetica, Arial" font-size="26" font-weight="bold" text-anchor="middle" fill="#1e1e2e">Essay Submission Process</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
  <g font-family="Helvetica, Arial" font-size="17" text-anchor="middle">
    <rect x="60" y="120" width="180" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="150" y="162" fill="#1e1e2e">1. Plan the essay</text>
    <rect x="310" y="120" width="180" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="400" y="162" fill="#1e1e2e">2. Write a draft</text>
    <rect x="560" y="120" width="180" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="650" y="154" fill="#1e1e2e">3. Get feedback</text>
    <text x="650" y="176" fill="#666" font-size="13">(tutor / peers)</text>
    <rect x="560" y="300" width="180" height="70" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="650" y="342" fill="#1e1e2e">4. Revise the draft</text>
    <rect x="310" y="300" width="180" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="400" y="334" fill="#1e1e2e">5. Check references</text>
    <text x="400" y="356" fill="#666" font-size="13">(APA style)</text>
    <rect x="60" y="300" width="180" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="150" y="342" fill="#1e1e2e">6. Submit online</text>
  </g>
  <g stroke="#333" stroke-width="2.5" marker-end="url(#arrow)" fill="none">
    <line x1="240" y1="155" x2="300" y2="155"/>
    <line x1="490" y1="155" x2="550" y2="155"/>
    <line x1="650" y1="190" x2="650" y2="290"/>
    <line x1="560" y1="335" x2="500" y2="335"/>
    <line x1="310" y1="335" x2="250" y2="335"/>
  </g>
  <path d="M560,320 C500,230 500,230 480,196" stroke="#d97706" stroke-width="2" stroke-dasharray="6,5" fill="none" marker-end="url(#arrow)"/>
  <text x="470" y="250" font-family="Helvetica, Arial" font-size="13" fill="#d97706">more feedback needed?</text>
  <text x="400" y="560" font-family="Helvetica, Arial" font-size="14" fill="#666" text-anchor="middle">Typical assignment workflow at university</text>
</svg>
