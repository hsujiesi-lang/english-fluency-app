<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="50" font-family="Helvetica, Arial" font-size="26" font-weight="bold" text-anchor="middle" fill="#1e1e2e">Average Daily Library Visits by Faculty (2026)</text>
  <line x1="90" y1="500" x2="740" y2="500" stroke="#333" stroke-width="2"/>
  <line x1="90" y1="500" x2="90" y2="100" stroke="#333" stroke-width="2"/>
  <text x="40" y="300" font-family="Helvetica, Arial" font-size="16" fill="#333" transform="rotate(-90 40 300)" text-anchor="middle">Visits per day</text>
  <g font-family="Helvetica, Arial" font-size="14" fill="#666" text-anchor="end">
    <text x="82" y="505">0</text><text x="82" y="405">500</text><text x="82" y="305">1000</text><text x="82" y="205">1500</text><text x="82" y="105">2000</text>
  </g>
  <g stroke="#eee" stroke-width="1">
