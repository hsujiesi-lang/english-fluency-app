  </g>
  <rect x="130" y="180" width="80" height="320" fill="#4f46e5"/>
  <rect x="250" y="260" width="80" height="240" fill="#4f46e5"/>
  <rect x="370" y="330" width="80" height="170" fill="#4f46e5"/>
  <rect x="490" y="230" width="80" height="270" fill="#4f46e5"/>
  <rect x="610" y="420" width="80" height="80" fill="#4f46e5"/>
