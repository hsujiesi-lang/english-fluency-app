  </g>
  <g font-family="Helvetica, Arial" font-size="15" fill="#333" text-anchor="middle">
    <text x="170" y="530">Arts</text><text x="290" y="530">Science</text><text x="410" y="530">Engineering</text><text x="530" y="530">Commerce</text><text x="650" y="530">Music</text>
